<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f8fb">
  <title>微博实时热点</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #fff;
      --text: #151822;
      --muted: #697083;
      --line: #e7eaf1;
      --red: #e5484d;
      --amber: #f59f00;
      --blue: #2563eb;
      --green: #0f9f6e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-size: 16px; }
    .shell { width: min(100%, 760px); margin: 0 auto; padding: calc(env(safe-area-inset-top) + 18px) 14px calc(env(safe-area-inset-bottom) + 22px); }
    header { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; padding: 8px 2px 14px; }
    h1 { margin: 0; font-size: clamp(26px, 8vw, 36px); line-height: 1.05; letter-spacing: 0; }
    .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; min-width: 116px; color: var(--muted); font-size: 12px; line-height: 1.2; text-align: right; }
    .status { display: inline-flex; align-items: center; gap: 6px; color: var(--green); font-weight: 700; white-space: nowrap; }
    .dot { width: 7px; height: 7px; border-radius: 99px; background: currentColor; }
    .toolbar { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; margin: 4px 0 12px; }
    .modebar { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 0 0 10px; }
    .sourcebar { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin: 0 0 10px; }
    .mode, .source { min-height: 38px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 800; white-space: nowrap; }
    .source { min-height: 36px; font-size: 13px; padding: 0 4px; }
    .active { border-color: var(--text); background: var(--text); color: #fff; }
    .search { width: 100%; min-height: 44px; border: 1px solid var(--line); border-radius: 8px; padding: 0 13px; font-size: 15px; background: #fff; color: var(--text); outline: none; }
    button { min-width: 46px; min-height: 44px; border: 0; border-radius: 8px; background: var(--text); color: #fff; font-size: 18px; font-weight: 800; }
    .notice, .empty { border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--muted); padding: 18px 14px; line-height: 1.6; }
    .notice { display: none; margin-bottom: 10px; border-color: #f2d08a; color: #755b18; background: #fff8e7; }
    .list { display: grid; gap: 8px; }
    .item { display: grid; grid-template-columns: 42px 1fr auto; gap: 10px; align-items: center; min-height: 76px; padding: 13px 12px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); color: inherit; text-decoration: none; }
    .rank { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 8px; background: #f0f2f6; color: #384052; font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; }
    .item:nth-child(1) .rank { background: var(--red); color: #fff; }
    .item:nth-child(2) .rank { background: var(--amber); color: #fff; }
    .item:nth-child(3) .rank { background: var(--blue); color: #fff; }
    .main { min-width: 0; display: grid; gap: 7px; }
    .title { display: flex; align-items: center; gap: 6px; min-width: 0; font-size: 16px; font-weight: 750; line-height: 1.32; }
    .title span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .heat { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
    .badge, .new { display: inline-flex; align-items: center; justify-content: center; height: 22px; border-radius: 6px; padding: 0 7px; font-size: 12px; font-weight: 800; white-space: nowrap; }
    .badge { background: #fff1f1; color: var(--red); }
    .new { background: var(--red); color: #fff; }
    @media (min-width: 640px) {
      .shell { padding-left: 20px; padding-right: 20px; }
      .item { grid-template-columns: 50px 1fr auto; padding: 15px 16px; }
      .rank { width: 38px; height: 38px; }
      .title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header>
      <h1>微博实时热点</h1>
      <div class="meta">
        <div class="status" id="status"><span class="dot"></span><span>更新中</span></div>
        <div id="updated">--</div>
      </div>
    </header>
    <section class="toolbar">
      <input class="search" id="filter" type="search" placeholder="搜索榜单" autocomplete="off">
      <button id="refresh" type="button" aria-label="刷新">↻</button>
    </section>
    <section class="modebar">
      <a class="mode" id="filteredMode" href="/">舆情筛选</a>
      <a class="mode" id="allMode" href="/?view=all">全部热搜</a>
    </section>
    <section class="sourcebar">
      <a class="source" id="sourceAll" href="/">综合</a>
      <a class="source" id="sourceWeibo" href="/?source=weibo">微博</a>
      <a class="source" id="sourceXinhua" href="/?source=xinhua">新华网</a>
      <a class="source" id="sourceRawAll" href="/?view=all&source=all">全量</a>
    </section>
    <section class="notice" id="notice"></section>
    <section class="list" id="list"></section>
  </main>
  <script>
    const API_BASE = "https://1451096226-kll61iiom1.ap-guangzhou.tencentscf.com";
    const params = new URLSearchParams(window.location.search);
    const state = {
      items: [],
      query: "",
      view: params.get("view") === "all" ? "all" : "filtered",
      sourceFilter: ["weibo", "xinhua"].includes(params.get("source")) ? params.get("source") : "all",
      totalItems: 0,
      visibleItems: 0,
      sourceCounts: { all: 0, weibo: 0, xinhua: 0 }
    };

    const list = document.querySelector("#list");
    const updated = document.querySelector("#updated");
    const status = document.querySelector("#status");
    const notice = document.querySelector("#notice");
    const filter = document.querySelector("#filter");
    const refresh = document.querySelector("#refresh");
    const filteredMode = document.querySelector("#filteredMode");
    const allMode = document.querySelector("#allMode");
    const sourceAll = document.querySelector("#sourceAll");
    const sourceWeibo = document.querySelector("#sourceWeibo");
    const sourceXinhua = document.querySelector("#sourceXinhua");
    const sourceRawAll = document.querySelector("#sourceRawAll");

    filter.addEventListener("input", () => {
      state.query = filter.value.trim().toLowerCase();
      renderList();
    });
    refresh.addEventListener("click", () => load(true));
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) load(false);
    });
    filteredMode.addEventListener("click", (event) => switchTab(event, "filtered", "all"));
    allMode.addEventListener("click", (event) => switchTab(event, "all", "all"));
    sourceAll.addEventListener("click", (event) => switchTab(event, "filtered", "all"));
    sourceWeibo.addEventListener("click", (event) => switchTab(event, "filtered", "weibo"));
    sourceXinhua.addEventListener("click", (event) => switchTab(event, "filtered", "xinhua"));
    sourceRawAll.addEventListener("click", (event) => switchTab(event, "all", "all"));
    window.addEventListener("popstate", () => {
      const next = new URLSearchParams(window.location.search);
      state.view = next.get("view") === "all" ? "all" : "filtered";
      state.sourceFilter = ["weibo", "xinhua"].includes(next.get("source")) ? next.get("source") : "all";
      load(false);
    });

    function switchTab(event, view, sourceFilter) {
      event.preventDefault();
      state.view = view;
      state.sourceFilter = sourceFilter;
      const next = new URLSearchParams();
      if (view === "all") next.set("view", "all");
      if (sourceFilter !== "all") next.set("source", sourceFilter);
      const url = next.toString() ? "/?" + next.toString() : "/";
      window.history.pushState({}, "", url);
      load(false);
    }

    async function load(force) {
      status.innerHTML = '<span class="dot"></span><span>更新中</span>';
      status.style.color = "var(--green)";
      try {
        const apiParams = new URLSearchParams();
        apiParams.set("view", state.view);
        apiParams.set("source", state.sourceFilter);
        if (force) apiParams.set("force", "1");
        const response = await fetch(API_BASE + "/api/hot?" + apiParams.toString(), { cache: "no-store" });
        const data = await response.json();
        state.items = Array.isArray(data.items) ? data.items : [];
        state.view = data.view === "all" ? "all" : "filtered";
        state.sourceFilter = ["weibo", "xinhua"].includes(data.sourceFilter) ? data.sourceFilter : "all";
        state.totalItems = Number(data.totalItems || state.items.length);
        state.visibleItems = Number(data.visibleItems || state.items.length);
        state.sourceCounts = data.sourceCounts || state.sourceCounts;
        updated.textContent = data.updatedAtText ? "最后更新 " + data.updatedAtText : "--";
        notice.style.display = data.error ? "block" : "none";
        notice.textContent = data.error || "";
        status.innerHTML = '<span class="dot"></span><span>' + statusText(data.source) + '</span>';
        status.style.color = data.source === "stale-cache" ? "var(--amber)" : "var(--green)";
        renderMode();
        renderList();
      } catch (error) {
        status.innerHTML = '<span class="dot"></span><span>连接失败</span>';
        status.style.color = "var(--red)";
        notice.style.display = "block";
        notice.textContent = "网络请求失败，请稍后重试。";
      }
    }

    function renderList() {
      const items = state.query
        ? state.items.filter((item) => String(item.title || "").toLowerCase().includes(state.query))
        : state.items;

      if (!items.length) {
        list.innerHTML = '<div class="empty">' + (state.view === "filtered" ? "当前没有匹配的舆情热点，可切换到全部热搜查看。" : "暂无热点数据。") + '</div>';
        return;
      }

      list.innerHTML = items.map((item) => `
        <a class="item" href="${escapeAttr(item.url)}" target="_blank" rel="noopener noreferrer">
          <div class="rank">${item.rank}</div>
          <div class="main">
            <div class="title">
              <span>${escapeHtml(item.title)}</span>
              ${item.isNew ? '<span class="new">新</span>' : ''}
            </div>
            <div class="heat">${escapeHtml(item.sourceName || "热点")} · 热度 ${escapeHtml(item.heat || "暂无")}</div>
          </div>
          <div class="badge">${escapeHtml(item.label || "热")}</div>
        </a>
      `).join("");
    }

    function renderMode() {
      filteredMode.classList.toggle("active", state.view === "filtered");
      allMode.classList.toggle("active", state.view === "all");
      sourceAll.classList.toggle("active", state.sourceFilter === "all" && state.view === "filtered");
      sourceWeibo.classList.toggle("active", state.sourceFilter === "weibo");
      sourceXinhua.classList.toggle("active", state.sourceFilter === "xinhua");
      sourceRawAll.classList.toggle("active", state.sourceFilter === "all" && state.view === "all");
      const suffix = state.view === "filtered"
        ? "舆情 " + state.visibleItems + "/" + state.totalItems
        : "全部 " + state.totalItems;
      if (!updated.textContent.includes(" · ")) updated.textContent += " · " + suffix;
    }

    function statusText(source) {
      if (source === "live") return "实时";
      if (source === "cache" || source === "stale-cache") return "缓存";
      return "就绪";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    load(false);
    setInterval(() => load(false), 60 * 1000);
  </script>
</body>
</html>
