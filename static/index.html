<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#edf3ff">
  <title>&#22810;&#24179;&#21488;&#28909;&#28857;&#38647;&#36798;</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #edf3ff;
      --surface: rgba(255, 255, 255, 0.76);
      --surface-strong: rgba(255, 255, 255, 0.92);
      --text: #172033;
      --muted: #697386;
      --line: rgba(111, 128, 158, 0.22);
      --shadow: 0 14px 34px rgba(30, 49, 86, 0.12);
      --blue: #2563eb;
      --cyan: #0891b2;
      --red: #e5484d;
      --amber: #f59f00;
      --green: #0f9f6e;
      --purple: #7c3aed;
      --rose: #db2777;
      --orange: #ea580c;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-size: 16px;
      background:
        linear-gradient(145deg, rgba(225, 239, 255, 0.98) 0%, rgba(247, 242, 255, 0.9) 46%, rgba(255, 247, 237, 0.92) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(37, 99, 235, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37, 99, 235, 0.05) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, #000 0%, transparent 72%);
    }

    .shell {
      position: relative;
      width: min(100%, 780px);
      margin: 0 auto;
      padding: calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 24px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 8px;
      padding: 18px 16px 16px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(16, 27, 54, 0.96), rgba(28, 73, 142, 0.9) 48%, rgba(12, 118, 139, 0.88));
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.12) 50%, transparent 100%),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 12px);
      mix-blend-mode: screen;
      opacity: 0.8;
    }

    .hero-content { position: relative; z-index: 1; display: grid; gap: 12px; }
    .eyebrow {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: rgba(255,255,255,0.76);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .live {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      color: #a7f3d0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: currentColor;
      box-shadow: 0 0 0 5px rgba(52, 211, 153, 0.16);
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 9vw, 44px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      max-width: 32rem;
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      line-height: 1.55;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: rgba(255,255,255,0.88);
      font-size: 12px;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0;
    }

    .stat {
      min-width: 0;
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 8px;
      padding: 10px 8px;
      background: var(--surface);
      box-shadow: 0 10px 26px rgba(30, 49, 86, 0.08);
      backdrop-filter: blur(16px);
    }

    .stat-value {
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 0 -14px 12px;
      padding: 10px 14px 12px;
      background: linear-gradient(to bottom, rgba(237, 243, 255, 0.96), rgba(237, 243, 255, 0.72));
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,0.5);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 46px;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .search {
      width: 100%;
      min-width: 0;
      min-height: 44px;
      border: 1px solid rgba(255,255,255,0.76);
      border-radius: 8px;
      padding: 0 13px;
      outline: none;
      color: var(--text);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 8px 22px rgba(30, 49, 86, 0.08);
      font-size: 15px;
    }

    .icon-button {
      min-width: 46px;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
      font-size: 20px;
      font-weight: 900;
    }

    .modebar, .platformbar, .filterbar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }

    .modebar::-webkit-scrollbar, .platformbar::-webkit-scrollbar, .filterbar::-webkit-scrollbar { display: none; }

    .mode, .platform, .filter-chip {
      flex: 0 0 auto;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 999px;
      padding: 0 13px;
      color: #536079;
      background: rgba(255,255,255,0.72);
      text-decoration: none;
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(30, 49, 86, 0.07);
    }

    .mode.active, .platform.active, .filter-chip.active {
      color: #fff;
      border-color: transparent;
      background: #172033;
    }

    .opinion-filters {
      display: none;
      gap: 8px;
      margin-top: 8px;
    }

    .opinion-filters.active { display: grid; }

    .sort-select {
      width: 100%;
      min-height: 38px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 8px;
      padding: 0 12px;
      color: #536079;
      background: rgba(255,255,255,0.76);
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(30, 49, 86, 0.07);
    }

    .platform.disabled { opacity: 0.48; }
    .platform-dot { width: 8px; height: 8px; border-radius: 99px; background: currentColor; }

    .notice, .state-card {
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 8px;
      background: var(--surface-strong);
      color: var(--muted);
      padding: 16px 14px;
      line-height: 1.65;
      box-shadow: 0 10px 26px rgba(30, 49, 86, 0.08);
      backdrop-filter: blur(14px);
    }

    .notice {
      display: none;
      margin-bottom: 10px;
      border-color: rgba(245, 159, 0, 0.35);
      color: #775b13;
      background: rgba(255, 249, 232, 0.88);
    }

    .list {
      display: grid;
      gap: 10px;
      transition: opacity 0.18s ease;
    }

    .list.refreshing { opacity: 0.78; }

    .hot-card {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 12px;
      min-width: 0;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 8px;
      color: inherit;
      text-decoration: none;
      background: rgba(255,255,255,0.82);
      box-shadow: 0 12px 30px rgba(30, 49, 86, 0.1);
      backdrop-filter: blur(18px);
    }

    .rank {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      color: #263247;
      background: linear-gradient(145deg, #f5f7fb, #e8edf6);
      font-size: 15px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .hot-card:nth-child(1) .rank { color: #fff; background: linear-gradient(145deg, #ef4444, #f97316); }
    .hot-card:nth-child(2) .rank { color: #fff; background: linear-gradient(145deg, #f59e0b, #eab308); }
    .hot-card:nth-child(3) .rank { color: #fff; background: linear-gradient(145deg, #2563eb, #06b6d4); }

    .opinion-card {
      grid-template-columns: 58px 1fr;
    }

    .score {
      display: grid;
      place-items: center;
      width: 50px;
      height: 50px;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(145deg, #172033, #2563eb);
      font-size: 15px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .status-current { color: #087f5b; background: #e6fff5; }
    .status-dropped { color: #805a00; background: #fff6d8; }
    .multi-tag { color: #5b21b6; background: #f1e8ff; }
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .metric {
      min-width: 0;
      padding: 8px;
      border-radius: 8px;
      color: #4b5567;
      background: rgba(105, 115, 134, 0.08);
      font-size: 12px;
      line-height: 1.35;
    }

    .metric strong {
      display: block;
      margin-top: 2px;
      color: #1f2937;
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .card-main { min-width: 0; display: grid; gap: 9px; }
    .card-top, .card-meta {
      min-width: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
    }

    .platform-badge, .tag, .new {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 23px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .platform-badge { color: var(--badge-color); background: var(--badge-bg); }
    .platform-weibo { --badge-color: #c2410c; --badge-bg: #fff0e7; }
    .platform-xinhua { --badge-color: #1d4ed8; --badge-bg: #eaf1ff; }
    .platform-renmin { --badge-color: #b91c1c; --badge-bg: #ffeaea; }
    .platform-toutiao { --badge-color: #be123c; --badge-bg: #fff0f4; }
    .platform-douyin { --badge-color: #0f766e; --badge-bg: #e6fffb; }
    .platform-zhihu { --badge-color: #2563eb; --badge-bg: #eaf1ff; }
    .platform-news { --badge-color: #6d28d9; --badge-bg: #f2ecff; }

    .time, .heat {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .card-title {
      margin: 0;
      color: #111827;
      font-size: 16px;
      line-height: 1.42;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .new { color: #fff; background: linear-gradient(135deg, #ef4444, #f97316); }
    .tag { color: #5f6678; background: rgba(105, 115, 134, 0.1); }

    .skeleton { display: grid; gap: 10px; }
    .skeleton-row {
      height: 88px;
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(255,255,255,0.52), rgba(255,255,255,0.86), rgba(255,255,255,0.52));
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }

    @keyframes shimmer {
      to { background-position: -200% 0; }
    }

    footer {
      margin-top: 18px;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.74);
      border-radius: 8px;
      color: var(--muted);
      background: rgba(255,255,255,0.68);
      box-shadow: 0 10px 24px rgba(30, 49, 86, 0.07);
      font-size: 12px;
      line-height: 1.65;
      backdrop-filter: blur(12px);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 10px;
      color: #eaf2ff;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .section-title span {
      color: rgba(226, 238, 255, 0.68);
      font-size: 12px;
      white-space: nowrap;
    }

    .analysis-panel {
      display: grid;
      gap: 10px;
    }

    .analysis-card {
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 12px;
      padding: 15px;
      color: #dbeafe;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.82), rgba(30, 41, 59, 0.72));
      box-shadow: 0 16px 36px rgba(2, 8, 23, 0.22);
      backdrop-filter: blur(18px);
    }

    .analysis-card h3 {
      margin: 0 0 10px;
      color: #fff;
      font-size: 15px;
    }

    .keyword-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword-cloud span {
      border: 1px solid rgba(125, 211, 252, 0.22);
      border-radius: 999px;
      padding: 7px 10px;
      color: #bae6fd;
      background: rgba(14, 165, 233, 0.12);
      font-size: 12px;
      font-weight: 800;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      width: min(100%, 780px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
      padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px);
      border-top: 1px solid rgba(148, 163, 184, 0.22);
      background: rgba(9, 16, 31, 0.9);
      backdrop-filter: blur(22px);
      box-shadow: 0 -14px 34px rgba(2, 8, 23, 0.28);
    }

    .nav-item {
      min-width: 0;
      min-height: 48px;
      display: grid;
      place-items: center;
      gap: 2px;
      border-radius: 12px;
      color: rgba(219, 234, 254, 0.62);
      text-decoration: none;
      font-size: 11px;
      font-weight: 850;
    }

    .nav-item span:first-child {
      font-size: 18px;
      line-height: 1;
    }

    .nav-item.active {
      color: #fff;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.92), rgba(6, 182, 212, 0.72));
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.3);
    }

    /* Intelligence cockpit theme overrides */
    body {
      background:
        radial-gradient(circle at 12% 0%, rgba(37, 99, 235, 0.34), transparent 32%),
        radial-gradient(circle at 88% 8%, rgba(6, 182, 212, 0.22), transparent 30%),
        linear-gradient(180deg, #07111f 0%, #0f1b2f 48%, #edf3ff 48.1%, #eef4ff 100%);
    }

    body::before {
      opacity: 0.55;
      background-image:
        linear-gradient(rgba(125, 211, 252, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(125, 211, 252, 0.08) 1px, transparent 1px);
    }

    .shell {
      padding-bottom: calc(env(safe-area-inset-bottom) + 92px);
    }

    .hero {
      border-color: rgba(148, 163, 184, 0.28);
      border-radius: 14px;
      padding: 20px 16px 18px;
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(30, 64, 175, 0.82) 52%, rgba(8, 145, 178, 0.72));
      box-shadow: 0 22px 54px rgba(2, 8, 23, 0.34);
    }

    .hero::before {
      content: "";
      position: absolute;
      right: -34px;
      top: -46px;
      width: 150px;
      height: 150px;
      border: 1px solid rgba(125, 211, 252, 0.28);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(125, 211, 252, 0.18), transparent 62%);
    }

    .eyebrow { color: rgba(219, 234, 254, 0.78); }
    h1 { font-size: clamp(30px, 8.5vw, 42px); }
    .subtitle { color: rgba(219, 234, 254, 0.84); }
    .hero-pill {
      border-color: rgba(125, 211, 252, 0.24);
      background: rgba(15, 23, 42, 0.28);
    }

    .stats {
      grid-template-columns: repeat(5, minmax(92px, 1fr));
      overflow-x: auto;
      scrollbar-width: none;
      padding: 2px 0 4px;
    }

    .stats::-webkit-scrollbar { display: none; }

    .stat {
      min-height: 82px;
      border-color: rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      color: #eaf2ff;
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.72), rgba(30, 41, 59, 0.58));
      box-shadow: 0 14px 32px rgba(2, 8, 23, 0.24);
    }

    .stat::before {
      display: block;
      margin-bottom: 8px;
      color: #7dd3fc;
      font-size: 16px;
      content: attr(data-icon);
    }

    .stat-value { color: #fff; font-size: 22px; }
    .stat-label { color: rgba(219, 234, 254, 0.68); }

    .controls {
      top: 0;
      border-bottom-color: rgba(148, 163, 184, 0.16);
      background: linear-gradient(to bottom, rgba(8, 15, 29, 0.94), rgba(8, 15, 29, 0.76));
    }

    .search, .sort-select {
      border-color: rgba(148, 163, 184, 0.22);
      color: #e5eefc;
      background: rgba(15, 23, 42, 0.72);
    }

    .search::placeholder { color: rgba(203, 213, 225, 0.58); }

    .mode, .platform, .filter-chip {
      border-color: rgba(148, 163, 184, 0.2);
      color: rgba(219, 234, 254, 0.74);
      background: rgba(15, 23, 42, 0.68);
      box-shadow: none;
    }

    .mode.active, .platform.active, .filter-chip.active {
      background: linear-gradient(135deg, #2563eb, #0891b2);
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.24);
    }

    .hot-card {
      position: relative;
      border-color: rgba(255,255,255,0.76);
      border-radius: 14px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.12);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .hot-card:active {
      transform: scale(0.985);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
    }

    .rank, .score {
      border-radius: 12px;
    }

    .card-meta {
      padding-top: 2px;
    }

    .heat-level-hot {
      color: #b91c1c;
      background: #fee2e2;
    }

    .heat-level-high {
      color: #a16207;
      background: #fef3c7;
    }

    .trend-up {
      color: #047857;
      background: #d1fae5;
    }

    .metric {
      border: 1px solid rgba(148, 163, 184, 0.12);
      background: rgba(241, 245, 249, 0.82);
    }

    @media (prefers-reduced-motion: no-preference) {
      .new, .trend-up {
        animation: pulseGlow 1.8s ease-in-out infinite;
      }
      @keyframes pulseGlow {
        0%, 100% { filter: brightness(1); }
        50% { filter: brightness(1.12); }
      }
    }

    @media (min-width: 640px) {
      .shell { padding-left: 20px; padding-right: 20px; }
      .hero { padding: 24px; }
      .controls { margin-left: -20px; margin-right: -20px; padding-left: 20px; padding-right: 20px; }
      .hot-card { grid-template-columns: 52px 1fr; padding: 16px; }
      .rank { width: 44px; height: 44px; }
      .card-title { font-size: 17px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero" aria-labelledby="pageTitle">
      <div class="hero-content">
        <div class="eyebrow">
          <span>&#26234;&#33021;&#24773;&#25253;&#20013;&#24515;</span>
          <span class="live" id="status"><span class="dot"></span><span>&#36830;&#25509;&#20013;</span></span>
        </div>
        <h1 id="pageTitle">&#26234;&#33021;&#33286;&#24773;&#38647;&#36798;</h1>
        <p class="subtitle">&#23454;&#26102;&#36861;&#36394;&#20840;&#32593;&#28909;&#28857;&#65292;&#36741;&#21161;&#33286;&#24773;&#20998;&#26512;&#19982;&#25253;&#21578;&#25776;&#20889;&#12290;</p>
        <div class="hero-meta">
          <span class="hero-pill" id="updated">&#26368;&#21518;&#26356;&#26032; --</span>
          <span class="hero-pill" id="viewLabel">&#33286;&#24773;&#31579;&#36873;</span>
        </div>
      </div>
    </section>

    <section class="stats" aria-label="stats">
      <div class="stat" data-icon="&#128202;"><div class="stat-value" id="todayCount">--</div><div class="stat-label">&#20170;&#26085;&#28909;&#28857;</div></div>
      <div class="stat" data-icon="&#128452;"><div class="stat-value" id="opinionCount">--</div><div class="stat-label">&#33286;&#24773;&#20107;&#20214;</div></div>

          <option value="score">&#25353;&#33286;&#24773;&#20215;&#20540;</option>
          <option value="current_heat">&#25353;&#24403;&#21069;&#28909;&#24230;</option>
          <option value="peak_heat">&#25353;&#21382;&#21490;&#26368;&#39640;&#28909;&#24230;</option>
          <option value="first_seen">&#25353;&#39318;&#27425;&#21457;&#29616;</option>

      <strong>&#25968;&#25454;&#35828;&#26126;</strong>&#65306;&#39029;&#38754;&#20165;&#23637;&#31034;&#24494;&#21338;&#28909;&#25628;&#19982;&#26032;&#21326;&#32593;&#20844;&#24320;&#20869;&#23481;&#30340;&#33258;&#21160;&#37319;&#38598;&#19982;&#35268;&#21017;&#31579;&#36873;&#32467;&#26524;&#65292;&#38750;&#23448;&#26041;&#27036;&#21333;&#25480;&#26435;&#29256;&#26412;&#12290;&#33286;&#24773;&#21028;&#26029;&#35831;&#32467;&#21512;&#21407;&#22987;&#38142;&#25509;&#12289;&#21457;&#24067;&#26102;&#38388;&#19982;&#22810;&#26041;&#20449;&#24687;&#20132;&#21449;&#26680;&#39564;&#12290;

    <a class="nav-item" data-nav="filter" href="/?panel=opinion&value=high"><span>&#128269;</span><span>&#31579;&#36873;</span></a>
    <a class="nav-item" data-nav="analysis" href="/?panel=analysis"><span>&#128200;</span><span>&#20998;&#26512;</span></a>
  </nav>

  <script>
    const DATA_URL = "data/hot-data.json";
    const SUPPORTED_SOURCES = ["weibo", "xinhua", "zhihu", "toutiao", "douyin", "people", "news"];
    const labels = {
      connecting: "\u8fde\u63a5\u4e2d",
      updating: "\u5237\u65b0\u4e2d",
      live: "\u5b9e\u65f6",
      cache: "\u7f13\u5b58",
      failed: "\u8fde\u63a5\u5931\u8d25",
      lastUpdated: "\u6700\u540e\u66f4\u65b0",
      filtered: "\u8206\u60c5\u7b5b\u9009",
      all: "\u5168\u90e8\u70ed\u641c",
      noFiltered: "\u5f53\u524d\u6ca1\u6709\u5339\u914d\u7684\u8206\u60c5\u70ed\u70b9\uff0c\u53ef\u5207\u6362\u5230\u5168\u90e8\u70ed\u641c\u67e5\u770b\u3002",
      unavailable: "\u8be5\u5e73\u53f0\u6682\u4e0d\u53ef\u7528\uff0c\u5df2\u4fdd\u7559\u5176\u4ed6\u5e73\u53f0\u70ed\u70b9\u3002",
      noData: "\u6682\u65e0\u70ed\u70b9\u6570\u636e\u3002",
      noOpinion: "\u6682\u65e0\u7b26\u5408\u6761\u4ef6\u7684\u8206\u60c5\u7d20\u6750\uff0c\u53ef\u653e\u5bbd\u7b5b\u9009\u6761\u4ef6\u6216\u7a0d\u540e\u5237\u65b0\u3002",
      requestFailed: "\u7f51\u7edc\u8bf7\u6c42\u5931\u8d25\uff0c\u5df2\u4fdd\u7559\u5f53\u524d\u9875\u9762\u6570\u636e\u3002",
      newHot: "\u65b0",
      realtime: "\u5b9e\u65f6\u699c\u5355",
      heat: "\u70ed\u5ea6",
      hot: "\u70ed\u70b9",
      radar: "\u5b9e\u65f6\u70ed\u70b9\u96f7\u8fbe",
      database: "\u8206\u60c5\u4e8b\u4ef6\u6570\u636e\u5e93",
      topicLibrary: "\u8206\u60c5\u9009\u9898\u5e93",
      analysisCenter: "AI \u5206\u6790\u4e2d\u5fc3",
      opinionPool: "\u8206\u60c5\u7b5b\u9009\u6c60",
      currentHot: "\u5f53\u524d\u5728\u699c",
      droppedHot: "\u5df2\u4e0b\u699c",
      rank: "\u6392\u540d",
      bestRank: "\u6700\u9ad8\u6392\u540d",
      peakHeat: "\u6700\u9ad8\u70ed\u5ea6",
      firstSeen: "\u9996\u6b21\u53d1\u73b0",
      lastSeen: "\u6700\u8fd1\u53d1\u73b0",
      score: "\u8206\u60c5\u5206",
      filteredRecords: "\u672a\u5165\u6c60\u8bb0\u5f55",
      hotLevelBoom: "\u7206\u70ed",
      hotLevelHigh: "\u9ad8\u70ed",
      hotLevelNormal: "\u666e\u901a",
      trendUp: "\u5feb\u901f\u4e0a\u6da8"
    };

    const params = new URLSearchParams(window.location.search);
    const initialPanel = ["hot", "opinion", "analysis"].includes(params.get("panel"))
      ? params.get("panel")
      : (params.get("view") || params.get("source") ? "hot" : "home");
    const state = {
      items: [],
      allItems: [],
      opinionPool: [],
      filteredOut: [],
      categories: [],
      query: "",
      panel: initialPanel,
      view: params.get("view") === "all" ? "all" : "filtered",
      sourceFilter: SUPPORTED_SOURCES.includes(params.get("source")) ? params.get("source") : "all",
      opinionFilters: {
        day: params.get("day") || "",
        status: params.get("status") || "",
        value: params.get("value") || "",
        multi: params.get("multi") === "1" ? "1" : "",
        debug: params.get("debug") === "1" ? "1" : "",
        category: params.get("category") || "",
        sort: params.get("sort") || "score"
      },
      totalItems: 0,
      visibleItems: 0,
      sourceCounts: { all: 0, weibo: 0, xinhua: 0, zhihu: 0, toutiao: 0, douyin: 0, people: 0, news: 0 },
      sourceStatus: [],
      loaded: false,
      loading: false
    };

    const list = document.querySelector("#list");
    const updated = document.querySelector("#updated");
    const viewLabel = document.querySelector("#viewLabel");
    const status = document.querySelector("#status");
    const notice = document.querySelector("#notice");
    const filter = document.querySelector("#filter");
    const refresh = document.querySelector("#refresh");
    const hotMode = document.querySelector("#hotMode");
    const opinionMode = document.querySelector("#opinionMode");
    const filteredMode = document.querySelector("#filteredMode");
    const allMode = document.querySelector("#allMode");
    const opinionFilters = document.querySelector("#opinionFilters");
    const categoryFilter = document.querySelector("#categoryFilter");
    const sortFilter = document.querySelector("#sortFilter");
    const filterChips = [...document.querySelectorAll(".filter-chip[data-filter]")];
    const platforms = [...document.querySelectorAll(".platform[data-source]")];
    const statEls = {
      today: document.querySelector("#todayCount"),
      opinion: document.querySelector("#opinionCount"),
      current: document.querySelector("#currentCount"),
      multi: document.querySelector("#multiCount"),
      highValue: document.querySelector("#highValueCount")
    };
    const navItems = [...document.querySelectorAll(".nav-item[data-nav]")];

    filter.addEventListener("input", () => {
      state.query = filter.value.trim().toLowerCase();
      renderList();
    });
    refresh.addEventListener("click", () => load(true));
    navItems.forEach((button) => {
      button.addEventListener("click", (event) => {
        event.preventDefault();
        const nav = button.dataset.nav;
        if (nav === "home") return switchTab(event, "home", "filtered", "all");
        if (nav === "hot") return switchTab(event, "hot", "filtered", "all");
        if (nav === "opinion") return switchTab(event, "opinion", "filtered", "all");
        if (nav === "filter") {
          state.opinionFilters.value = "high";
          return switchTab(event, "opinion", "filtered", "all");
        }
        return switchTab(event, "analysis", "filtered", "all");
      });
    });
    hotMode.addEventListener("click", (event) => switchTab(event, "hot", "filtered", "all"));
    opinionMode.addEventListener("click", (event) => switchTab(event, "opinion", "filtered", "all"));
    filteredMode.addEventListener("click", (event) => switchTab(event, "filtered", "all"));
    allMode.addEventListener("click", (event) => switchTab(event, "all", "all"));
    platforms.forEach((button) => {
      button.addEventListener("click", (event) => {
        const source = button.dataset.source;
        if (source === "rawall") return switchTab(event, "hot", "all", "all");
        return switchTab(event, state.panel, "filtered", source);
      });
    });
    filterChips.forEach((button) => {
      button.addEventListener("click", (event) => {
        event.preventDefault();
        const key = button.dataset.filter;
        const value = button.dataset.value || "";
        state.opinionFilters[key] = state.opinionFilters[key] === value ? "" : value;
        updateUrl();
        load(false);
      });
    });
    categoryFilter.addEventListener("change", () => {
      state.opinionFilters.category = categoryFilter.value;
      updateUrl();
      load(false);
    });
    sortFilter.addEventListener("change", () => {
      state.opinionFilters.sort = sortFilter.value || "score";
      updateUrl();
      load(false);
    });
    window.addEventListener("popstate", () => {
      const next = new URLSearchParams(window.location.search);
      state.panel = ["hot", "opinion", "analysis"].includes(next.get("panel"))
        ? next.get("panel")
        : (next.get("view") || next.get("source") ? "hot" : "home");
      state.view = next.get("view") === "all" ? "all" : "filtered";
      state.sourceFilter = SUPPORTED_SOURCES.includes(next.get("source")) ? next.get("source") : "all";
      state.opinionFilters = {
        day: next.get("day") || "",
        status: next.get("status") || "",
        value: next.get("value") || "",
        multi: next.get("multi") === "1" ? "1" : "",
        debug: next.get("debug") === "1" ? "1" : "",
        category: next.get("category") || "",
        sort: next.get("sort") || "score"
      };
      load(false);
    });
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) load(false);
    });
    window.setInterval(() => {
      if (!document.hidden) load(false);
    }, 120000);

    function switchTab(event, panel, view, sourceFilter) {
      event.preventDefault();
      if (!["home", "hot", "opinion", "analysis"].includes(panel)) {
        sourceFilter = view;
        view = panel;
        panel = "hot";
      }
      state.panel = panel;
      state.view = view;
      state.sourceFilter = sourceFilter;
      updateUrl();
      load(false);
    }

    function updateUrl() {
      const next = new URLSearchParams();
      if (state.panel === "hot") next.set("panel", "hot");
      if (state.panel === "opinion") next.set("panel", "opinion");
      if (state.panel === "analysis") next.set("panel", "analysis");
      if (state.panel === "hot" && state.view === "all") next.set("view", "all");
      if (state.sourceFilter !== "all") next.set("source", state.sourceFilter);
      if (state.panel === "opinion") {
        Object.entries(state.opinionFilters).forEach(([key, value]) => {
          if (value && !(key === "sort" && value === "score")) next.set(key, value);
        });
      }
      window.history.pushState({}, "", next.toString() ? "/?" + next.toString() : "/");
    }

    async function load(force) {
      state.loading = true;
      setStatus(labels.updating, "var(--green)");
      notice.style.display = "none";
      list.classList.toggle("refreshing", state.loaded);
      if (!state.loaded) renderLoading();

      try {
        const response = await fetch(DATA_URL + "?v=" + (force ? Date.now() : Math.floor(Date.now() / 60000)), { cache: "no-store" });
        if (!response.ok) throw new Error("HTTP " + response.status);
        const payload = await response.json();
        const data = state.panel === "opinion" ? buildOpinionData(payload) : buildHotData(payload);

        state.allItems = Array.isArray(payload.items) ? payload.items : [];
        state.opinionPool = Array.isArray(payload.opinionPool) ? payload.opinionPool : [];
        state.items = Array.isArray(data.items) ? data.items : [];
        state.filteredOut = Array.isArray(data.filteredOut) ? data.filteredOut : [];
        state.categories = Array.isArray(data.categories) ? data.categories : state.categories;
        if (state.panel === "hot" || state.panel === "home" || state.panel === "analysis") {
          state.view = data.view === "all" ? "all" : "filtered";
          state.sourceFilter = SUPPORTED_SOURCES.includes(data.sourceFilter) ? data.sourceFilter : "all";
        }
        state.totalItems = Number(data.totalItems || state.items.length);
        state.visibleItems = Number(data.visibleItems || state.items.length);
        state.sourceCounts = data.sourceCounts || state.sourceCounts;
        state.sourceStatus = Array.isArray(data.sourceStatus) ? data.sourceStatus : [];
        state.loaded = true;

        updated.textContent = data.updatedAtText ? labels.lastUpdated + " " + data.updatedAtText : labels.lastUpdated + " --";
        viewLabel.textContent = viewLabelText();
        if (data.error) showNotice(data.error);
        setStatus(statusText(data.source), data.source === "stale-cache" ? "var(--amber)" : "var(--green)");
        renderMode();
        renderCategoryOptions();
        renderStats();
        renderList();
      } catch (error) {
        setStatus(labels.failed, "var(--red)");
        showNotice(labels.requestFailed);
        if (!state.loaded) renderError();
      } finally {
        state.loading = false;
        list.classList.remove("refreshing");
      }
    }

    function buildHotData(payload) {
      const allItems = Array.isArray(payload.items) ? payload.items : [];
      const sourceItems = filterBySource(allItems, state.sourceFilter);
      const publicItems = filterBySource(Array.isArray(payload.publicOpinionItems) ? payload.publicOpinionItems : [], state.sourceFilter);
      const items = state.view === "all" ? sourceItems : publicItems;
      return {
        ...payload,
        view: state.view,
        sourceFilter: state.sourceFilter,
        totalItems: sourceItems.length,
        visibleItems: items.length,
        sourceCounts: payload.sourceCounts || countSources(allItems),
        sourceStatus: payload.sourceStatus || [],
        items
      };
    }

    function buildOpinionData(payload) {
      const today = getDateKey(0);
      const yesterday = getDateKey(1);
      let items = Array.isArray(payload.opinionPool) ? payload.opinionPool : [];
      items = items.filter((item) => item.date === today || item.date === yesterday);
      if (state.sourceFilter !== "all") items = items.filter((item) => (item.platforms || [item.source || "weibo"]).includes(state.sourceFilter));
      if (state.opinionFilters.category) items = items.filter((item) => item.category === state.opinionFilters.category);
      if (state.opinionFilters.day === "today") items = items.filter((item) => item.date === today);
      if (state.opinionFilters.day === "yesterday") items = items.filter((item) => item.date === yesterday);
      if (state.opinionFilters.status === "current") items = items.filter((item) => item.is_currently_hot);
      if (state.opinionFilters.status === "dropped") items = items.filter((item) => !item.is_currently_hot);
      if (state.opinionFilters.value === "high") items = items.filter((item) => Number(item.score || 0) >= 80);
      if (state.opinionFilters.multi === "1") items = items.filter((item) => Number(item.platform_count || 0) > 1);
      items = sortOpinionItems(items, state.opinionFilters.sort || "score");
      return {
        ...payload,
        filters: { ...state.opinionFilters, platform: state.sourceFilter },
        categories: payload.categories || [],
        sourceCounts: payload.sourceCounts || countSources(payload.items || []),
        sourceStatus: payload.sourceStatus || [],
        totalItems: items.length,
        visibleItems: items.length,
        filteredOut: state.opinionFilters.debug === "1" ? (payload.filteredOut || []) : [],
        items
      };
    }

    function filterBySource(items, sourceFilter) {
      return sourceFilter === "all" ? items : items.filter((item) => (item.source || "weibo") === sourceFilter);
    }

    function countSources(items) {
      const counts = { all: items.length, weibo: 0, xinhua: 0, zhihu: 0, toutiao: 0, douyin: 0, people: 0, news: 0 };
      items.forEach((item) => {
        const source = item.source || "weibo";
        counts[source] = (counts[source] || 0) + 1;
      });
      return counts;
    }

    function sortOpinionItems(items, sort) {
      const list = [...items];
      const byNumber = (field) => (a, b) => Number(b[field] || 0) - Number(a[field] || 0);
      const byDate = (field) => (a, b) => new Date(b[field] || 0) - new Date(a[field] || 0);
      if (sort === "current_heat") return list.sort(byNumber("hot_value"));
      if (sort === "peak_heat") return list.sort(byNumber("peak_hot_value"));
      if (sort === "first_seen") return list.sort(byDate("first_seen"));
      if (sort === "last_seen") return list.sort(byDate("last_seen"));
      if (sort === "duration") {
        return list.sort((a, b) =>
          (new Date(b.last_seen || 0) - new Date(b.first_seen || 0)) -
          (new Date(a.last_seen || 0) - new Date(a.first_seen || 0))
        );
      }
      return list.sort((a, b) => Number(b.score || 0) - Number(a.score || 0) || new Date(b.last_seen || 0) - new Date(a.last_seen || 0));
    }

    function viewLabelText() {
      if (state.panel === "analysis") return labels.analysisCenter;
      if (state.panel === "opinion") return labels.opinionPool + " " + state.totalItems;
      if (state.panel === "home") return "\u9996\u9875\u603b\u89c8 " + state.visibleItems + "/" + state.totalItems;
      return state.view === "all" ? labels.all + " " + state.totalItems : labels.filtered + " " + state.visibleItems + "/" + state.totalItems;
    }

    function renderStats() {
      const today = getDateKey(0);
      const hotItems = state.allItems.length ? state.allItems : state.items;
      const opinionItems = state.opinionPool;
      const todayCount = hotItems.filter((item) => (item.date || item.dateKey) === today || (!item.date && !item.dateKey)).length;
      const opinionCount = opinionItems.length;
      const currentCount = opinionItems.filter((item) => item.is_currently_hot).length || hotItems.length;
      const multiCount = opinionItems.filter((item) => Number(item.platform_count || 0) > 1).length;
      const highValueCount = opinionItems.filter((item) => Number(item.score || 0) >= 80).length;
      const platformCount = Object.entries(state.sourceCounts)
        .filter(([key, value]) => key !== "all" && Number(value) > 0)
        .length || new Set(hotItems.flatMap((item) => item.platforms || [item.source || "weibo"])).size;

      statEls.today.textContent = todayCount;
      statEls.opinion.textContent = opinionCount;
      statEls.current.textContent = currentCount;
      statEls.multi.textContent = multiCount;
      statEls.highValue.textContent = highValueCount;
    }

    function renderList() {
      if (state.panel === "analysis") {
        renderAnalysisPanel();
        return;
      }
      const items = state.query
        ? state.items.filter((item) => {
            const haystack = [
              item.title,
              item.sourceName,
              item.label,
              item.heat,
              item.category,
              item.status,
              ...(item.platforms || [])
            ].map((value) => String(value || "").toLowerCase()).join(" ");
            return haystack.includes(state.query);
          })
        : state.items;

      if (!items.length) {
        const debugHtml = state.panel === "opinion" && state.filteredOut.length ? renderFilteredOut() : "";
        list.innerHTML = renderSectionTitle() + '<div class="state-card">' + emptyMessage() + '</div>' + debugHtml;
        return;
      }

      const cards = state.panel === "opinion"
        ? items.map(renderOpinionCard).join("")
        : items.map((item) => {
        const platform = platformMeta(item);
        const dateText = item.dateKey ? formatDateKey(item.dateKey) : labels.realtime;
        const heat = hotLevel(item);
        return `
          <a class="hot-card" href="${escapeAttr(item.url)}" target="_blank" rel="noopener noreferrer">
            <div class="rank">${escapeHtml(String(item.rank || "-"))}</div>
            <div class="card-main">
              <div class="card-top">
                <span class="platform-badge ${platform.className}">${platform.name}</span>
                <span class="time">${dateText}</span>
                <span class="tag ${heat.className}">${heat.icon} ${heat.text}</span>
                ${Number(item.rank || 99) <= 10 ? '<span class="tag trend-up">↗ ' + labels.trendUp + '</span>' : ''}
                ${item.isNew ? '<span class="new">' + labels.newHot + '</span>' : ''}
              </div>
              <h2 class="card-title">${escapeHtml(item.title || labels.hot)}</h2>
              <div class="card-meta">
                <span class="heat">${labels.heat} ${escapeHtml(item.heat || "--")}</span>
                ${item.label ? '<span class="tag">' + escapeHtml(item.label) + '</span>' : ''}
              </div>
            </div>
          </a>
        `;
      }).join("");
      list.innerHTML = renderSectionTitle() + cards + (state.panel === "opinion" && state.filteredOut.length ? renderFilteredOut() : "");
    }

    function renderOpinionCard(item) {
      const statusTextValue = item.is_currently_hot ? labels.currentHot : labels.droppedHot;
      const statusClass = item.is_currently_hot ? "status-current" : "status-dropped";
      const reasons = recommendationReasons(item);
      const platformTags = (item.platforms || [item.source || "weibo"]).map((source) => {
        const meta = platformMeta({ source });
        return '<span class="platform-badge ' + meta.className + '">' + meta.name + '</span>';
      }).join("");
      const link = item.url || "#";
      return `
        <a class="hot-card opinion-card" href="${escapeAttr(link)}" target="_blank" rel="noopener noreferrer">
          <div class="score">${escapeHtml(String(item.score ?? "--"))}</div>
          <div class="card-main">
            <div class="card-top">
              ${platformTags}
              <span class="tag">${escapeHtml(item.category || "\u5176\u4ed6")}</span>
              <span class="tag ${statusClass}">${statusTextValue}</span>
              ${item.multi_platform ? '<span class="tag multi-tag">\u591a\u5e73\u53f0 ' + escapeHtml(String(item.platform_count || 2)) + '</span>' : ''}
            </div>
            <h2 class="card-title">${escapeHtml(item.title || labels.hot)}</h2>
            <div class="card-meta">${reasons.map((reason) => '<span class="tag trend-up">' + escapeHtml(reason) + '</span>').join("")}</div>
            <div class="metric-grid">
              <span class="metric">${labels.rank}<strong>${escapeHtml(String(item.current_rank || "--"))}</strong></span>
              <span class="metric">${labels.bestRank}<strong>${escapeHtml(String(item.best_rank || "--"))}</strong></span>
              <span class="metric">${labels.heat}<strong>${escapeHtml(item.hot_value_text || item.hot_value || "--")}</strong></span>
              <span class="metric">${labels.peakHeat}<strong>${escapeHtml(item.peak_hot_value_text || item.peak_hot_value || "--")}</strong></span>
              <span class="metric">${labels.firstSeen}<strong>${formatTime(item.first_seen)}</strong></span>
              <span class="metric">${labels.lastSeen}<strong>${formatTime(item.last_seen)}</strong></span>
            </div>
          </div>
        </a>
      `;
    }

    function renderSectionTitle() {
      let title = labels.radar;
      let hint = "\u70ed\u95e8\u6392\u34892\u5206\u949f\u81ea\u52a8\u5237\u65b0";
      if (state.panel === "home") {
        title = "\u201c\u201d\u4eca\u65e5\u24773\u62a5\u901f\u89c8".replace("\u201c\u201d", "");
        hint = "\u805a\u5408\u70ed\u70b9\u4e0e\u8206\u60c5\u4e8b\u4ef6";
      } else if (state.panel === "opinion") {
        title = state.opinionFilters.value === "high" ? labels.topicLibrary : labels.database;
        hint = "\u4fdd\u7559\u4eca\u5929\u548c\u6628\u5929\u7684\u6709\u6548\u9009\u9898";
      } else if (state.view === "all") {
        title = "\u5168\u90e8\u70ed\u641c\u8d8b\u52bf";
        hint = "\u70ed\u95e8\u6392\u884c\u00b7\u65b0\u51fa\u73b0\u00b7\u5feb\u901f\u4e0a\u6da8";
      }
      return '<div class="section-title"><h2>' + escapeHtml(title) + '</h2><span>' + escapeHtml(hint) + '</span></div>';
    }

    function hotLevel(item) {
      const value = Number(item.hot_value || 0);
      const rank = Number(item.rank || 99);
      if (value >= 800000 || rank <= 3) return { text: labels.hotLevelBoom, icon: "\u{1F525}", className: "heat-level-hot" };
      if (value >= 300000 || rank <= 12) return { text: labels.hotLevelHigh, icon: "\u2B50", className: "heat-level-high" };
      return { text: labels.hotLevelNormal, icon: "", className: "" };
    }

    function recommendationReasons(item) {
      const reasons = [];
      if (item.multi_platform || Number(item.platform_count || 0) > 1) reasons.push("\u591a\u5e73\u53f0\u4f20\u64ad");
      if (Number(item.score || 0) >= 80) reasons.push("\u9ad8\u8206\u60c5\u4ef7\u503c");
      if (Number(item.peak_hot_value || 0) >= 500000) reasons.push("\u6301\u7eed\u70ed\u5ea6\u9ad8");
      if (["\u793e\u4f1a", "\u6c11\u751f", "\u516c\u5171\u5b89\u5168", "\u6559\u80b2", "\u533b\u7597"].includes(item.category)) reasons.push("\u793e\u4f1a\u5173\u6ce8\u5ea6\u9ad8");
      return reasons.slice(0, 3);
    }

    function renderAnalysisPanel() {
      const categories = new Map();
      state.opinionPool.forEach((item) => categories.set(item.category || "\u5176\u4ed6", (categories.get(item.category || "\u5176\u4ed6") || 0) + 1));
      const topCategories = [...categories.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5);
      const keywords = topCategories.map(([name]) => name).concat(state.items.slice(0, 6).map((item) => item.category || item.label || item.sourceName).filter(Boolean)).slice(0, 10);
      const high = state.opinionPool.filter((item) => Number(item.score || 0) >= 80).length;
      const multi = state.opinionPool.filter((item) => Number(item.platform_count || 0) > 1).length;
      list.innerHTML = `
        ${renderSectionTitle().replace(labels.radar, labels.analysisCenter)}
        <div class="analysis-panel">
          <section class="analysis-card">
            <h3>\u4eca\u65e5\u8206\u60c5\u6982\u89c8</h3>
            <div class="metric-grid">
              <span class="metric">\u8206\u60c5\u4e8b\u4ef6<strong>${state.opinionPool.length}</strong></span>
              <span class="metric">\u9ad8\u4ef7\u503c\u9009\u9898<strong>${high}</strong></span>
              <span class="metric">\u591a\u5e73\u53f0\u4f20\u64ad<strong>${multi}</strong></span>
              <span class="metric">\u4e3b\u8981\u7c7b\u522b<strong>${escapeHtml(topCategories[0]?.[0] || "--")}</strong></span>
            </div>
          </section>
          <section class="analysis-card">
            <h3>\u8206\u60c5\u5173\u952e\u8bcd\u4e91</h3>
            <div class="keyword-cloud">${keywords.map((word) => '<span>' + escapeHtml(word) + '</span>').join("")}</div>
          </section>
          <section class="analysis-card">
            <h3>AI \u5206\u6790\u5361\u7247</h3>
            <div class="metric-grid">
              <span class="metric">\u4e8b\u4ef6\u5f71\u54cd<strong>\u4f18\u5148\u5173\u6ce8\u9ad8\u5206\u4e0e\u591a\u5e73\u53f0\u9009\u9898</strong></span>
              <span class="metric">\u4f20\u64ad\u8d8b\u52bf<strong>\u5f53\u524d\u4ee5\u793e\u4f1a\u6c11\u751f\u548c\u516c\u5171\u4e8b\u4ef6\u4e3a\u4e3b</strong></span>
              <span class="metric">\u5173\u6ce8\u5efa\u8bae<strong>\u6838\u5bf9\u539f\u59cb\u94fe\u63a5\u540e\u7528\u4e8e\u62a5\u544a\u9009\u9898</strong></span>
              <span class="metric">\u6570\u636e\u72b6\u6001<strong>\u9759\u6001\u91c7\u96c6\u6570\u636e\u5df2\u66f4\u65b0</strong></span>
            </div>
          </section>
        </div>
      `;
    }

    function renderFilteredOut() {
      const rows = state.filteredOut.slice(0, 20).map((item) =>
        '<div class="metric"><strong>' + escapeHtml(item.title || labels.hot) + '</strong>' +
        escapeHtml(item.reason || "") + ' · ' + labels.score + ' ' + escapeHtml(String(item.score ?? "--")) + '</div>'
      ).join("");
      return '<div class="state-card"><strong>' + labels.filteredRecords + '</strong><div class="metric-grid" style="margin-top:10px">' + rows + '</div></div>';
    }

    function renderLoading() {
      list.innerHTML = '<div class="skeleton"><div class="skeleton-row"></div><div class="skeleton-row"></div><div class="skeleton-row"></div></div>';
    }

    function renderError() {
      list.innerHTML = '<div class="state-card">' + labels.requestFailed + '</div>';
    }

    function renderMode() {
      hotMode.classList.toggle("active", state.panel === "hot" || state.panel === "home");
      opinionMode.classList.toggle("active", state.panel === "opinion");
      filteredMode.classList.toggle("active", state.panel === "hot" && state.view === "filtered");
      allMode.classList.toggle("active", state.panel === "hot" && state.view === "all");
      opinionFilters.classList.toggle("active", state.panel === "opinion");
      categoryFilter.value = state.opinionFilters.category || "";
      sortFilter.value = state.opinionFilters.sort || "score";
      filter.placeholder = state.panel === "opinion"
        ? "\u641c\u7d22\u8206\u60c5\u6807\u9898\u3001\u5206\u7c7b\u6216\u5e73\u53f0"
        : "\u641c\u7d22\u70ed\u70b9\u3001\u5e73\u53f0\u6216\u6807\u7b7e";
      platforms.forEach((button) => {
        const source = button.dataset.source;
        button.classList.toggle("active",
          (source === "all" && state.sourceFilter === "all" && (state.panel === "opinion" || state.view === "filtered")) ||
          (source === "rawall" && state.panel === "hot" && state.view === "all" && state.sourceFilter === "all") ||
          (SUPPORTED_SOURCES.includes(source) && source === state.sourceFilter)
        );
      });
      filterChips.forEach((button) => {
        const key = button.dataset.filter;
        const value = button.dataset.value || "";
        button.classList.toggle("active", Boolean(state.opinionFilters[key]) && state.opinionFilters[key] === value);
      });
      navItems.forEach((button) => {
        const nav = button.dataset.nav;
        button.classList.toggle("active",
          (nav === "home" && state.panel === "home") ||
          (nav === "hot" && state.panel === "hot") ||
          (nav === "opinion" && state.panel === "opinion" && state.opinionFilters.value !== "high") ||
          (nav === "filter" && state.panel === "opinion" && state.opinionFilters.value === "high") ||
          (nav === "analysis" && state.panel === "analysis")
        );
      });
    }

    function renderCategoryOptions() {
      const current = state.opinionFilters.category || "";
      const categories = state.categories.length ? state.categories : [];
      const options = ['<option value="">\u5168\u90e8\u5206\u7c7b</option>']
        .concat(categories.map((category) => '<option value="' + escapeAttr(category) + '">' + escapeHtml(category) + '</option>'));
      categoryFilter.innerHTML = options.join("");
      categoryFilter.value = current;
    }

    function platformMeta(item) {
      const source = String(item.source || "weibo").toLowerCase();
      const name = String(item.sourceName || "");
      if (source === "weibo" || name.includes("\u5fae\u535a")) return { name: "\u5fae\u535a", className: "platform-weibo" };
      if (source === "xinhua" || name.includes("\u65b0\u534e")) return { name: "\u65b0\u534e\u7f51", className: "platform-xinhua" };
      if (source.includes("renmin") || name.includes("\u4eba\u6c11\u65e5\u62a5")) return { name: "\u4eba\u6c11\u65e5\u62a5", className: "platform-renmin" };
      if (source.includes("toutiao") || name.includes("\u5934\u6761")) return { name: "\u4eca\u65e5\u5934\u6761", className: "platform-toutiao" };
      if (source.includes("douyin") || name.includes("\u6296\u97f3")) return { name: "\u6296\u97f3", className: "platform-douyin" };
      if (source.includes("zhihu") || name.includes("\u77e5\u4e4e")) return { name: "\u77e5\u4e4e", className: "platform-zhihu" };
      return { name: name || "\u5176\u4ed6\u65b0\u95fb", className: "platform-news" };
    }

    function emptyMessage() {
      if (state.panel === "opinion") return labels.noOpinion;
      const status = state.sourceStatus.find((item) => item.id === state.sourceFilter);
      if (state.sourceFilter !== "all" && status && !status.ok && !status.fallback) {
        return (status.name || "") + labels.unavailable;
      }
      return state.view === "filtered" ? labels.noFiltered : labels.noData;
    }

    function statusText(source) {
      if (source === "live") return labels.live;
      if (source === "cache" || source === "stale-cache") return labels.cache;
      return labels.live;
    }

    function setStatus(text, color) {
      status.style.color = color;
      status.innerHTML = '<span class="dot"></span><span>' + escapeHtml(text) + '</span>';
    }

    function showNotice(message) {
      notice.style.display = "block";
      notice.textContent = message;
    }

    function getDateKey(daysAgo) {
      const date = new Date(Date.now() + 8 * 60 * 60 * 1000 - daysAgo * 24 * 60 * 60 * 1000);
      return date.toISOString().slice(0, 10).replaceAll("-", "");
    }

    function formatDateKey(key) {
      return /^\d{8}$/.test(String(key)) ? key.slice(0, 4) + "-" + key.slice(4, 6) + "-" + key.slice(6, 8) : labels.realtime;
    }

    function formatTime(value) {
      if (!value) return "--";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "--";
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      return month + "-" + day + " " + hour + ":" + minute;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value || "#");
    }

    renderMode();
    renderStats();
    load(false);
  </script>
</body>
</html>
